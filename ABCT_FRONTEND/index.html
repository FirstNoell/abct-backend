<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCT | Japanese Restaurant</title>

    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav>
        <div class="logo">
            <img src="ABC_NOBACK_2026-04-03_112714-removebg-preview.png" alt="ABCT Logo">
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul class="nav-links" id="navLinks">
            <li><a href="#home">Home</a></li>
            <li><a href="#booking">Booking</a></li>
            <li><a href="#delivery">Delivery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- HOME -->
<section id="home">
    <div class="overlay">
        <h1>🍣 ABCT Japanese Restaurant</h1>
        <p>Experience authentic Japanese dining</p>
    </div>
</section>

<!-- BOOKING -->
<section id="booking">
    <h2>📅 Reservation</h2>

    <form id="bookingForm">
        <input type="hidden" name="form-name" value="booking">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone" required>

        <!-- ✅ FIXED DROPDOWN -->
        <select name="booking_type" required>
            <option value="">Select Reservation Type</option>
            <option value="dine_in">Dine-In</option>
            <option value="event">Event Reservation</option>
        </select>

        <input type="date" name="date" required>
        <input type="time" name="time" required>

        <input type="number" name="guests" placeholder="Guests" required>

        <button type="submit" id="submitBtn">Book Now</button>
    </form>
</section>

<!-- DELIVERY -->
<section id="delivery">
    <h2>🚚 Delivery Order</h2>

    <form id="deliveryForm">
        <input type="hidden" name="form-name" value="delivery">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="phone" placeholder="Phone" required>

        <textarea name="address" placeholder="Address" required></textarea>
        <textarea name="order_details" placeholder="Order Details" required></textarea>

        <input type="date" name="date" required>
        <input type="time" name="time" required>

        <!-- ✅ PAYMENT DROPDOWN FIX -->
        <select name="payment_method" required>
            <option value="">Select Payment</option>
            <option value="cash">Cash</option>
            <option value="gcash">GCash</option>
        </select>

        <button type="submit" id="deliveryBtn">Place Order</button>
    </form>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <p>Email: charlie0315coronado@gmail.com</p>
</section>

<script src="script.js"></script>

</body>
</html>
